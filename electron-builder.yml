appId: com.blacksmith.studio
productName: Blacksmith Studio
directories:
  output: release
  buildResources: resources

# Restore +x on bundled Mach-O binaries that the universal-app merge
# and/or force-install step strips. See build/after-pack.cjs.
afterPack: build/after-pack.cjs

files:
  - dist/**/*
  - node_modules/**/*
  - "!node_modules/.cache"

# Binaries and native addons must live on disk, not inside app.asar.
# `spawn()` can't execute files from inside an asar archive — attempting
# to do so yields ENOTDIR at runtime (worked in dev, broke in production).
#
# Only the platform/arch-specific uv packages are unpacked. The main
# `@manzt/uv/uv` shim is unused at runtime (we resolve the arch-specific
# package directly).
asarUnpack:
  - "node_modules/@manzt/uv-*/**"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  # Universal macOS builds fuse an x64 and an arm64 intermediate app via
  # @electron/universal. That step aborts when it finds a Mach-O file
  # that's byte-identical in both intermediate builds and isn't listed
  # here. Three categories of file trip the check in this app:
  #
  #   1. Platform-specific uv binaries. We install BOTH
  #      `@manzt/uv-darwin-x64` and `@manzt/uv-darwin-arm64` in every
  #      build so the universal app carries both; at runtime we pick
  #      the right one by `process.arch`
  #      (see server/services/python/package-manager.ts).
  #   2. Native-module `.node` files pre-lipo'd into universal fat
  #      binaries (e.g. `better-sqlite3/bin/darwin-universal-*/…node`)
  #      by `@electron/rebuild --arch universal` — identical across
  #      both intermediate apps.
  #   3. Arch-specific prebuilt executables shipped by native modules
  #      (e.g. `node-pty/prebuilds/darwin-arm64/spawn-helper`). The
  #      arm64 copy is the arm64 binary in both intermediate builds.
  #
  # The pattern only suppresses the error when the two copies are
  # byte-identical — genuinely arch-specific files that differ between
  # builds still get lipo'd automatically.
  x64ArchFiles: "**/{*.node,spawn-helper,@manzt/uv-*/bin/uv*}"

win:
  target:
    - nsis
    - zip

linux:
  target:
    - AppImage
    - deb
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
