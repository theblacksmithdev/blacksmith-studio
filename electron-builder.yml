appId: com.blacksmith.studio
productName: Blacksmith Studio
directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - node_modules/**/*
  - "!node_modules/.cache"

# Binaries and native addons must live on disk, not inside app.asar.
# `spawn()` can't execute files from inside an asar archive — attempting
# to do so yields ENOTDIR at runtime (worked in dev, broke in production).
asarUnpack:
  - "node_modules/@manzt/uv/**"
  - "node_modules/@manzt/uv-*/**"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true

win:
  target:
    - nsis
    - zip

linux:
  target:
    - AppImage
    - deb
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
