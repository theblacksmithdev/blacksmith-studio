appId: com.blacksmith.studio
productName: Blacksmith Studio
directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - node_modules/**/*
  - "!node_modules/.cache"

# Binaries and native addons must live on disk, not inside app.asar.
# `spawn()` can't execute files from inside an asar archive — attempting
# to do so yields ENOTDIR at runtime (worked in dev, broke in production).
#
# Only the platform/arch-specific uv packages are unpacked. The main
# `@manzt/uv/uv` shim is unused at runtime (we resolve the arch-specific
# package directly).
asarUnpack:
  - "node_modules/@manzt/uv-*/**"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  # Universal macOS builds fuse an x64 and an arm64 intermediate app via
  # @electron/universal. Both intermediate builds include BOTH platform-
  # specific uv packages (`@manzt/uv-darwin-x64` and `@manzt/uv-darwin-arm64`),
  # so the Mach-O uv binary inside each package is byte-identical across
  # the two intermediate apps. Without this rule, @electron/universal
  # aborts with "same in both x64 and arm64 builds and not covered by the
  # x64ArchFiles rule". The pattern opts these binaries out of lipo and
  # keeps them as-is, which is what we want — at runtime we pick the right
  # one by `process.arch` (see server/services/python/package-manager.ts).
  x64ArchFiles: "**/@manzt/uv-*/bin/uv*"

win:
  target:
    - nsis
    - zip

linux:
  target:
    - AppImage
    - deb
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
