name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest # arm64; universal merge runs here
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Version ────────────────────────────────────────────────
      - id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            LATEST_VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      # ── Install deps WITHOUT the arch-locked native rebuild ────
      - name: Install dependencies (skip postinstall)
        run: npm install --ignore-scripts

      # npm only installs the host-arch `@manzt/uv-darwin-*`
      # optional dep. Force-install the other arch so the universal
      # app carries both uv binaries.
      - name: Force-install both uv platform packages
        run: |
          npm install --no-save --force \
            @manzt/uv-darwin-x64 \
            @manzt/uv-darwin-arm64

      # The @manzt/uv package's install.cjs copies ONE arch's binary
      # into `node_modules/@manzt/uv/uv`. That shim is only a fallback
      # our runtime never hits (it resolves from the platform packages
      # — see server/services/python/package-manager.ts), and leaving
      # it in place breaks @electron/universal — it flags a Mach-O
      # executable that's byte-identical across the two arch builds.
      # Nuke it before packaging.
      - name: Remove host-arch uv shim (prevents universal merge error)
        run: rm -f node_modules/@manzt/uv/uv

      # ── Rebuild native modules as universal fat binaries ───────
      # `@electron/rebuild --arch universal` builds arm64 + x64 for
      # better-sqlite3 / node-pty and fuses them via @electron/universal.
      - name: Rebuild native modules (universal)
        run: npx -y @electron/rebuild@latest --arch universal --force

      - name: Stamp version
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Build client + electron
        run: npm run build

      - name: Package universal mac build
        run: npm run package:mac -- --universal
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Create tag (auto-release from master)
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Blacksmith Studio ${{ steps.version.outputs.tag }}
          files: |
            release/*.dmg
            release/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-beta') || contains(steps.version.outputs.version, '-alpha') }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
